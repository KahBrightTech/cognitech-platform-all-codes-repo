apiVersion: v1
kind: Service
metadata:
  name: myapp-pod-nodeport-service
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - name: http
    port: 80 # Service Port (what other services use to connect)
    targetPort: 80 # Container Port (what the app actually listens on)
    nodePort: 31231 # NodePort (external access port)
