apiVersion: v1 # String
kind: Pod # String
metadata:
  # Dictionary
  name: myapp-pod
  labels:
    # Dictionary 
    app: myapp
    tier: frontend
    environment: development
spec:
  containers:
  # List
  - name: myapp
    image: njibrigthain100/brigthain:hwv3
    ports:
    - containerPort: 80
      name: http
      protocol: TCP
    # Resource requests and limits
    resources:
      requests:
        memory: "64Mi" # Minimum memory required
        cpu: "250m" # Minimum CPU required (0.25 cores)
      limits:
        memory: "128Mi" # Maximum memory allowed
        cpu: "500m" # Maximum CPU allowed (0.5 cores)

    # Environment variables
    env:
    - name: APP_ENV
      value: "development"
    - name: APP_PORT
      value: "80"
    - name: APP_NAME
      value: "myapp"
