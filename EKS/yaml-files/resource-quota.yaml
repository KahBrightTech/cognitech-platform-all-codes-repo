apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resource-quota
  namespace: dev
spec:
  hard:
    # Compute resource limits
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    # Object count limits
    pods: "20"
    services: "10"
    configmaps: "20"
    secrets: "20"
    persistentvolumeclaims: "10"
    replicationcontrollers: "10"
    services.loadbalancers: "2"
    services.nodeports: "5"
    # Storage limits
    requests.storage: 50Gi
